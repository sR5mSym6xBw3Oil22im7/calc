<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      --page-bg-1: #0f1115;
      --page-bg-2: #171b22;
      --page-glow-1: rgba(55, 167, 255, 0.12);
      --page-glow-2: rgba(232, 177, 90, 0.09);
      --panel: rgba(29, 33, 42, 0.96);
      --panel-2: rgba(20, 23, 30, 0.96);
      --display-bg: linear-gradient(180deg, rgba(10, 12, 16, 0.9), rgba(22, 25, 32, 0.96));
      --text: #f2f4f8;
      --muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      --digit: linear-gradient(180deg, #2b303c 0%, #232833 100%);
      --digit-hover: linear-gradient(180deg, #353c4a 0%, #2f3642 100%);
      --operator: linear-gradient(180deg, #e8b15a 0%, #d8892b 100%);
      --operator-hover: linear-gradient(180deg, #f2be76 0%, #e1973b 100%);
      --operator-text: #171208;
      --equal: linear-gradient(180deg, #37a7ff 0%, #1778ff 100%);
      --equal-hover: linear-gradient(180deg, #55b4ff 0%, #2c8cff 100%);
      --equal-text: #ffffff;
      --utility: linear-gradient(180deg, #414b5f 0%, #2a3342 100%);
      --utility-hover: linear-gradient(180deg, #4f5b72 0%, #354051 100%);
      --utility-text: #e7edf7;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, var(--page-glow-1), transparent 30%),
        radial-gradient(circle at bottom right, var(--page-glow-2), transparent 25%),
        linear-gradient(180deg, var(--page-bg-1) 0%, var(--page-bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .meteor-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .meteor-active .meteor-layer {
      opacity: 1;
    }

    .meteor {
      position: absolute;
      top: var(--top, 20%);
      left: var(--left, 110%);
      width: var(--len, 220px);
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0.62) 8%, rgba(255, 255, 255, 0.22) 30%, rgba(255, 255, 255, 0.08) 65%, rgba(255, 255, 255, 0.02) 100%);
      filter: drop-shadow(0 0 12px var(--meteor-glow, rgba(255,255,255,0.6)));
      transform: rotate(var(--angle, -25deg)) translate3d(0, 0, 0);
      animation: meteor-fall var(--dur, 4.2s) linear infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0;
    }

    .meteor::before {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--meteor-glow, rgba(255,255,255,0.95));
      transform: translateY(-50%);
      box-shadow: 0 0 10px var(--meteor-glow, rgba(255,255,255,0.85));
    }

    .meteor::after {
      content: "";
      position: absolute;
      inset: -5px auto -5px 0;
      width: calc(100% - 8px);
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.58) 0%, rgba(255,255,255,0.14) 65%, rgba(255,255,255,0) 100%);
      opacity: 0.8;
      filter: blur(2px);
    }

    @keyframes meteor-fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(var(--angle, -25deg));
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      30% {
        opacity: 1;
      }
      100% {
        transform: translate3d(-210vw, 150vh, 0) rotate(var(--angle, -25deg));
        opacity: 0;
      }
    }

    .calculator {
      width: min(100%, 360px);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .theme-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding: 7px 34px 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04));
      color: var(--text);
      font: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: none;
      min-height: 0;
      text-transform: uppercase;
      outline: none;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04)),
        linear-gradient(45deg, transparent 50%, currentColor 50%),
        linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position:
        0 0,
        calc(100% - 18px) 50%,
        calc(100% - 12px) 50%;
      background-size:
        auto,
        6px 6px,
        6px 6px;
      background-repeat: no-repeat;
    }

    .theme-select:hover {
      filter: brightness(1.06);
    }

    .theme-select option {
      color: #111827;
      border: 1px solid var(--border);
    }

    .display {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .expression {
      min-height: 28px;
      font-size: 0.96rem;
      color: var(--muted);
      text-align: right;
      word-break: break-all;
    }

    .result {
      font-size: clamp(1.8rem, 7vw, 2.5rem);
      font-weight: 700;
      text-align: right;
      letter-spacing: 0.02em;
      word-break: break-all;
      line-height: 1.15;
    }

    .keys {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      color: var(--text);
      font: inherit;
      font-weight: 600;
      min-height: 58px;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 8px 18px rgba(0, 0, 0, 0.24);
      user-select: none;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .digit, .decimal {
      background: var(--digit);
    }

    .digit:hover, .decimal:hover {
      background: var(--digit-hover);
    }

    .operator {
      background: var(--operator);
      color: var(--operator-text);
    }

    .operator:hover {
      background: var(--operator-hover);
    }

    .equal {
      background: var(--equal);
      color: var(--equal-text);
    }

    .equal:hover {
      background: var(--equal-hover);
    }

    .clear {
      background: var(--operator);
      color: var(--operator-text);
    }

    .clear:hover {
      background: var(--operator-hover);
    }

    .backspace {
      background: var(--operator);
      color: var(--operator-text);
    }

    .backspace:hover {
      background: var(--operator-hover);
    }

    .wide {
      grid-column: span 2;
    }

    .span-2 {
      grid-column: span 2;
    }

    @media (max-width: 420px) {
      .calculator {
        padding: 14px;
        border-radius: 20px;
      }

      .keys {
        gap: 8px;
      }

      button {
        min-height: 54px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="meteorLayer" class="meteor-layer" aria-hidden="true"></div>
  <main class="calculator" aria-label="Calculator">

        <option value="8">No.9 Gaming</option>
        <option value="9">No.10 Modern</option>

    </div>

    <section class="display" aria-live="polite">

      <div id="result" class="result">0</div>
    </section>

    <section class="keys" aria-label="電卓キー">
      <button class="clear" data-action="clear">C</button>
      <button class="backspace" data-action="backspace">⌫</button>
      <button class="operator" data-action="operator" data-value="÷">÷</button>
      <button class="operator" data-action="operator" data-value="×">×</button>

      <button class="digit" data-action="digit" data-value="7">7</button>
      <button class="digit" data-action="digit" data-value="8">8</button>
      <button class="digit" data-action="digit" data-value="9">9</button>
      <button class="operator" data-action="operator" data-value="+">+</button>

      <button class="digit" data-action="digit" data-value="4">4</button>
      <button class="digit" data-action="digit" data-value="5">5</button>
      <button class="digit" data-action="digit" data-value="6">6</button>
      <button class="operator" data-action="operator" data-value="−">−</button>

      <button class="digit" data-action="digit" data-value="1">1</button>
      <button class="digit" data-action="digit" data-value="2">2</button>
      <button class="digit" data-action="digit" data-value="3">3</button>
      <button class="decimal" data-action="decimal" data-value=".">.</button>

      <button class="digit span-2" data-action="digit" data-value="0">0</button>
      <button class="equal span-2" data-action="equals">=</button>
    </section>
  </main>

        {

      ];

      function applyTheme(theme, themeIndex) {
        const rootStyle = document.documentElement.style;
        rootStyle.setProperty('--page-bg-1', theme.pageBg1);
        rootStyle.setProperty('--page-bg-2', theme.pageBg2);
        rootStyle.setProperty('--page-glow-1', theme.pageGlow1);
        rootStyle.setProperty('--page-glow-2', theme.pageGlow2);
        rootStyle.setProperty('--panel', theme.panel);
        rootStyle.setProperty('--panel-2', theme.panel2);
        rootStyle.setProperty('--display-bg', theme.displayBg);
        rootStyle.setProperty('--text', theme.text);
        rootStyle.setProperty('--muted', theme.muted);
        rootStyle.setProperty('--border', theme.border);
        rootStyle.setProperty('--shadow', theme.shadow);
        rootStyle.setProperty('--digit', theme.digit);
        rootStyle.setProperty('--digit-hover', theme.digitHover);
        rootStyle.setProperty('--operator', theme.operator);
        rootStyle.setProperty('--operator-hover', theme.operatorHover);
        rootStyle.setProperty('--operator-text', theme.operatorText);
        rootStyle.setProperty('--equal', theme.equal);
        rootStyle.setProperty('--equal-hover', theme.equalHover);
        rootStyle.setProperty('--equal-text', theme.equalText);
        rootStyle.setProperty('--history-bg', theme.historyBg);
        rootStyle.setProperty('--history-item-bg', theme.historyItemBg);
        rootStyle.setProperty('--history-item-border', theme.historyItemBorder);
        rootStyle.setProperty('--meteor-glow', theme.meteorGlow || 'rgba(255,255,255,0.85)');
        themeSelectEl.value = String(themeIndex);
        renderMeteors(theme);
      }

      function applyThemeByIndex(index) {
        const safeIndex = ((index % themes.length) + themes.length) % themes.length;
        applyTheme(themes[safeIndex], safeIndex);
      }

      applyThemeByIndex(Math.floor(Math.random() * themes.length));

      themeSelectEl.addEventListener('change', () => {
        applyThemeByIndex(Number(themeSelectEl.value));
      });

      const state = {
        currentInput: '0',
        firstOperand: null,
        operator: null,
        waitingForSecondOperand: false,
        lastExpression: ''
      };

      function updateDisplay() {
        if (state.lastExpression && state.firstOperand === null && state.operator === null && !state.waitingForSecondOperand) {
          expressionEl.textContent = state.lastExpression;
        } else {
          const expressionParts = [];
          if (state.firstOperand !== null) {
            expressionParts.push(formatNumber(state.firstOperand));
          }
          if (state.operator) {
            expressionParts.push(state.operator);
          }
          if (state.firstOperand === null && state.operator === null && state.currentInput !== '0') {
            expressionParts.push(state.currentInput);
          }
          expressionEl.textContent = expressionParts.join(' ');
        }
        resultEl.textContent = state.currentInput;
      }

      function formatNumber(value) {
        if (value === null || value === undefined || value === '') return '0';
        const num = Number(value);
        if (Number.isFinite(num)) {
          return String(num);
        }
        return String(value);
      }

      function appendDigit(digit) {
        if (state.currentInput === 'Error') {
          clearAll();
        }
        if (state.lastExpression && state.firstOperand === null && state.operator === null && !state.waitingForSecondOperand) {
          state.lastExpression = '';
          state.currentInput = '0';
        }
        if (state.waitingForSecondOperand) {
          state.currentInput = digit;
          state.waitingForSecondOperand = false;
          resultEl.textContent = state.currentInput;
          return;
        }

        if (state.currentInput === '0') {
          state.currentInput = digit;
        } else {
          state.currentInput += digit;
        }
      }

      function appendDecimal() {
        if (state.currentInput === 'Error') {
          clearAll();
        }
        if (state.lastExpression && state.firstOperand === null && state.operator === null && !state.waitingForSecondOperand) {
          state.lastExpression = '';
          state.currentInput = '0';
        }
        if (state.waitingForSecondOperand) {
          state.currentInput = '0.';
          state.waitingForSecondOperand = false;
          return;
        }
        if (!state.currentInput.includes('.')) {
          state.currentInput += '.';
        }
      }

      function calculate(first, operator, second) {
        const a = Number(first);
        const b = Number(second);

        if (!Number.isFinite(a) || !Number.isFinite(b)) {
          return 0;
        }

        switch (operator) {
          case '+':
            return a + b;
          case '−':
            return a - b;
          case '×':
            return a * b;
          case '÷':
            return b === 0 ? 'Error' : a / b;
          default:
            return b;
        }
      }

      function chooseOperator(nextOperator) {
        if (state.currentInput === 'Error') {
          return;
        }
        if (state.lastExpression && state.firstOperand === null && state.operator === null && !state.waitingForSecondOperand) {
          state.lastExpression = '';
        }
        if (state.firstOperand === null) {
          state.firstOperand = state.currentInput;
        } else if (state.operator && !state.waitingForSecondOperand) {
          const result = calculate(state.firstOperand, state.operator, state.currentInput);
          if (result === 'Error') {
            commitError();
            return;
          }
          state.currentInput = trimResult(result);
          state.firstOperand = state.currentInput;
        }

        state.operator = nextOperator;
        state.waitingForSecondOperand = true;
      }

      function commitResult() {
        if (state.firstOperand === null || !state.operator) {
          return;
        }

        const expressionBefore = `${formatNumber(state.firstOperand)} ${state.operator} ${state.currentInput}`;
        const result = calculate(state.firstOperand, state.operator, state.currentInput);

        if (result === 'Error') {
          commitError();
          return;
        }

        const output = trimResult(result);
        state.lastExpression = `${formatNumber(state.firstOperand)} ${state.operator} ${state.currentInput} = ${output}`;
        state.currentInput = output;
        state.firstOperand = null;
        state.operator = null;
        state.waitingForSecondOperand = false;
      }

      function commitError() {
        state.currentInput = 'Error';
        state.firstOperand = null;
        state.operator = null;
        state.waitingForSecondOperand = false;
        state.lastExpression = '';
      }

      function trimResult(value) {
        if (typeof value === 'string') {
          return value;
        }

        const rounded = Number.parseFloat(Number(value).toFixed(10));
        return String(rounded);
      }

      function clearAll() {
        state.currentInput = '0';
        state.firstOperand = null;
        state.operator = null;
        state.waitingForSecondOperand = false;
        state.lastExpression = '';
      }

      function backspace() {
        if (state.waitingForSecondOperand || state.currentInput === 'Error') {
          return;
        }
        if (state.currentInput.length <= 1 || (state.currentInput.length === 2 && state.currentInput.startsWith('-'))) {
          state.currentInput = '0';
          return;
        }
        state.currentInput = state.currentInput.slice(0, -1);
      }

      keys.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;

        const action = button.dataset.action;
        const value = button.dataset.value;

        switch (action) {
          case 'digit':
            appendDigit(value);
            break;
          case 'decimal':
            appendDecimal();
            break;
          case 'operator':
            chooseOperator(value);
            break;
          case 'equals':
            commitResult();
            break;
          case 'clear':
            clearAll();
            break;
          case 'backspace':
            backspace();
            break;
        }

        updateDisplay();
      });

      document.addEventListener('keydown', (event) => {
        const { key } = event;
        if (/^\d$/.test(key)) {
          appendDigit(key);
        } else if (key === '.') {
          appendDecimal();
        } else if (['+', '-', '*', '/'].includes(key)) {
          const map = { '+': '+', '-': '−', '*': '×', '/': '÷' };
          chooseOperator(map[key]);
        } else if (key === 'Enter' || key === '=') {
          event.preventDefault();
          commitResult();
        } else if (key === 'c' || key === 'C') {
          clearAll();
        } else if (key === 'Backspace') {
          event.preventDefault();
          backspace();
        } else if (key === 'Escape') {
          clearAll();
        } else {
          return;
        }
        updateDisplay();
      });

      updateDisplay();
    })();
  </script>
